<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Grid Energy Demand Forecasting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid #334155;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #f1f5f9;
        }
        .subtitle {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #cbd5e1;
        }
        input[type="datetime-local"] {
            width: 100%;
            padding: 12px 14px;
            font-size: 15px;
            border: 1px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
            outline: none;
            transition: border 0.2s;
        }
        input[type="datetime-local"]:focus {
            border-color: #3b82f6;
        }
        button {
            width: 100%;
            margin-top: 18px;
            padding: 13px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: #2563eb;
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .result-box {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            display: none;
        }
        .result-box.visible {
            display: block;
        }
        .result-box .value {
            font-size: 32px;
            font-weight: 700;
            color: #38bdf8;
        }
        .result-box .unit {
            font-size: 16px;
            color: #94a3b8;
        }
        .result-box .detail {
            margin-top: 10px;
            font-size: 13px;
            color: #64748b;
        }
        .result-box .detail span {
            color: #cbd5e1;
        }
        .error {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            background: #450a0a;
            border: 1px solid #991b1b;
            color: #fca5a5;
            font-size: 14px;
            display: none;
        }
        .error.visible {
            display: block;
        }
        .spinner {
            display: none;
            margin-top: 16px;
            text-align: center;
        }
        .spinner.visible {
            display: block;
        }
        .spinner::after {
            content: "";
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .info {
            margin-top: 20px;
            font-size: 12px;
            color: #475569;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Smart Grid Forecast</h1>
        <p class="subtitle">Predict hourly electricity demand (MW)</p>

        <label for="datetime">Pick a date and time</label>
        <input type="datetime-local" id="datetime">

        <button id="predictBtn">Get Forecast</button>

        <div class="spinner" id="spinner"></div>
        <div class="error" id="error"></div>

        <div class="result-box" id="resultBox">
            <div class="value" id="predictedValue">--</div>
            <div class="unit">Megawatts (MW) predicted load</div>
            <div class="detail" id="featureInfo"></div>
        </div>

        <div class="info">Enter a date/time and click to see the forecast.</div>
    </div>

    <script>
        const datetimeInput = document.getElementById('datetime');
        const predictBtn = document.getElementById('predictBtn');
        const spinner = document.getElementById('spinner');
        const errorDiv = document.getElementById('error');
        const resultBox = document.getElementById('resultBox');
        const predictedValue = document.getElementById('predictedValue');
        const featureInfo = document.getElementById('featureInfo');

        const isLocal = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost';
        const API_BASE = isLocal ? 'http://127.0.0.1:8000' : '/api';

        datetimeInput.value = new Date().toISOString().slice(0, 16);

        predictBtn.addEventListener('click', async () => {
            const raw = datetimeInput.value;
            if (!raw) {
                showError("Please pick a date and time.");
                return;
            }
            const dt = raw.replace('T', ' ') + ':00';

            resultBox.classList.remove('visible');
            errorDiv.classList.remove('visible');
            spinner.classList.add('visible');
            predictBtn.disabled = true;

            try {
                const res = await fetch(`${API_BASE}/predict?dt=${encodeURIComponent(dt)}`);
                const data = await res.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                predictedValue.textContent = data.predicted_load_mw.toLocaleString() + ' MW';
                featureInfo.innerHTML = `
                    Hour: <span>${data.features_used.hour}:00</span> &nbsp;|&nbsp;
                    Day of week: <span>${data.features_used.day_of_week}</span> &nbsp;|&nbsp;
                    Month: <span>${data.features_used.month}</span>
                `;
                resultBox.classList.add('visible');
            } catch (err) {
                showError("Could not connect to the backend. Make sure the API is running.");
            } finally {
                spinner.classList.remove('visible');
                predictBtn.disabled = false;
            }
        });

        function showError(msg) {
            errorDiv.textContent = msg;
            errorDiv.classList.add('visible');
        }
    </script>
</body>
</html>
